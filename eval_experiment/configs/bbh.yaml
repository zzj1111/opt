# BBH runs as a group of 27 subtasks; lm-eval task name is "bbh"
task: bbh
num_fewshot: 3
metric: acc_norm,none
description: "BIG-Bench Hard (3-shot CoT): 23 diverse reasoning tasks"
gen_kwargs:
  temperature: 0.6
  top_p: 0.95
  do_sample: true
  top_k: 20
  max_gen_toks: 2048
# Limit to 2K samples for cost control (lm-eval --limit per subtask)
limit: 2000
